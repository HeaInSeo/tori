name: core-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  core-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run core tests
        run: make test-core

      - name: Run core lint gate
        run: make lint
